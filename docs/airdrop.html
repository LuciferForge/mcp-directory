// API helpers
// ═══════════════════════════════════════════════════════════════════════════
function buildEVMUrls(address, chainId, apiKey) {
  let base; let useKey = true;
  if (V2_CHAINS.has(chainId) && chainId !== 80094 && chainId !== 146) {
    base = `https://api.etherscan.io/v2/api?chainid=${chainId}`;
  } else if (chainId === 80094) {
    base = "https://api.routescan.io/v2/network/mainnet/evm/80094/etherscan/api?x=1";
    useKey = false;
  } else if (chainId === 146) {
    base = "https://api.sonicscan.org/api?x=1";
    // Sonicscan needs its own key — if user supplied Etherscan, this'll fail gracefully
  } else if (chainId === 10143) {
    base = "https://testnet.monadexplorer.com/api?x=1";
    useKey = false;
  } else {
    return null;
  }
  const k = useKey && apiKey ? `&apikey=${apiKey}` : "";
  return {
    txList: `${base}&module=account&action=txlist&address=${address}&startblock=0&endblock=99999999&sort=asc&page=1&offset=2000${k}`,
    balance: `${base}&module=account&action=balance&address=${address}&tag=latest${k}`,
  };
}

async function fetchWithRetry(url, attempts = 2) {
  for (let i = 0; i < attempts; i++) {
    try {
      const r = await fetch(url, { method: 'GET' });
      if (r.status === 429 || r.status === 503) {
        await sleep(1500 + i * 1500);
        continue;
      }
      if (!r.ok) {
        return { ok: false, error: `HTTP ${r.status}` };
      }
      const data = await r.json();
      return { ok: true, data };
    } catch (e) {
      if (i === attempts - 1) return { ok: false, error: e.message };
      await sleep(800);
    }
  }
  return { ok: false, error: 'unknown' };
}

async function fetchEVMChain(address, chainId, apiKey) {
  const urls = buildEVMUrls(address, chainId, apiKey);
  if (!urls) return { txs: [], balWei: "0", error: "Unsupported chain" };
  const [tr, br] = await Promise.all([
    fetchWithRetry(urls.txList),
    fetchWithRetry(urls.balance),
  ]);
  const data = tr.ok ? tr.data : null;
  const txs = (data && data.status === "1") ? (data.result || []) : [];
  const err = !tr.ok ? tr.error :
              (data && data.status !== "1" && data.message && !String(data.message).includes("No transactions") ? String(data.message) : null);
  return { txs, balWei: (br.ok && br.data ? br.data.result : "0") || "0", error: err };
}

// FIX from v1: use UTC day, count all relevant interactions, surface gas spent
function computeEVMMetrics(txs, address, balWei) {
  const addr = address.toLowerCase();
  const now = Date.now() / 1000;
  // Outgoing txs (user-initiated activity)
  const out = txs.filter(t => t.from && t.from.toLowerCase() === addr && t.isError !== "1");
  // Track all wallets touched (token transfers, contracts called)
  const counterparties = new Set();
  out.forEach(t => { if (t.to) counterparties.add(t.to.toLowerCase()); });
  // Days in UTC (not local timezone)
  const days = new Set(out.map(t => new Date(parseInt(t.timeStamp) * 1000).toISOString().slice(0, 10)));
  // Time spread: stddev of tx timestamps in days (higher = more consistent over time)
  const spread = (() => {
    if (out.length < 2) return 0;
    const ts = out.map(t => parseInt(t.timeStamp));
    const min = Math.min(...ts), max = Math.max(...ts);
    return (max - min) / 86400;
  })();
  // Gas spent (sum gasUsed * gasPrice across outgoing)
  let gasWei = 0n;
  try {
    out.forEach(t => {
      if (t.gasUsed && t.gasPrice) {
        gasWei += BigInt(t.gasUsed) * BigInt(t.gasPrice);
      }
    });
  } catch (e) { gasWei = 0n; }
  const gasNative = Number(gasWei) / 1e18;
  return {
    txCount: out.length,
    uniqueDays: days.size,
    daysList: [...days],
    counterpartiesCount: counterparties.size,
    spread,
    recentlyActive: out.some(t => parseInt(t.timeStamp) > now - 30 * 86400) ? 1 : 0,
    totalValueEth: out.reduce((s, t) => s + parseFloat(t.value || "0") / 1e18, 0),
    lastDaysAgo: txs.length ? Math.floor((now - parseInt(txs[txs.length - 1].timeStamp)) / 86400) : null,
    hasBalance: parseFloat(balWei) / 1e18 > 0.05 ? 1 : 0,
    balanceNative: parseFloat(balWei) / 1e18,
    gasNative,
    counterparties: [...counterparties],
  };
}

async function fetchSolana(address, heliusKey) {
  if (!heliusKey) return { txs: [], error: "Missing Helius key" };
  const all = []; let before;
  for (let p = 0; p < 8; p++) {
    try {
      let url = `https://api.helius.xyz/v0/addresses/${address}/transactions?api-key=${heliusKey}&limit=100`;
      if (before) url += `&before=${before}`;
      const r = await fetch(url);
      if (!r.ok) {
        const t = await r.text();
        return { txs: all, error: `Helius ${r.status}: ${t.slice(0, 80)}` };
      }
      const d = await r.json();
      if (!Array.isArray(d) || !d.length) break;
      all.push(...d);
      before = d[d.length - 1].signature;
      if (d.length < 100) break;
      await sleep(220);
    } catch (e) { return { txs: all, error: e.message }; }
  }
  return { txs: all, error: null };
}

    const ps = new Set();
    (tx.instructions || []).forEach(i => i.programId && ps.add(i.programId));
    (tx.innerInstructions || []).forEach(ii => (ii.instructions || []).forEach(i => i.programId && ps.add(i.programId)));
    ps.forEach(p => { programCounts[p] = (programCounts[p] || 0) + 1; counterparties.add(p); });
  });
  // Gas (fees) sum
  const feeLamports = mine.reduce((s, t) => s + (t.fee || 0), 0);
  const feeSOL = feeLamports / 1e9;
  return {
    solTxCount: mine.length,
    solUniqueDays: days.size,
    solCounterparties: counterparties.size,
    solRecentlyActive: mine.some(t => t.timestamp > now - 30 * 86400) ? 1 : 0,
    solGasNative: feeSOL,
    daysList: [...days],
    jupiterTxs:  programCounts["JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4"] || 0,
    kaminoTxs:   programCounts["KLend2g3cP87fffoy8q1mQqGKjrL4D8KCRG2aFiGJFt"] || 0,
    driftTxs:    programCounts["dRiftyHA39MWEi3m9aunc5MzRF1JYuBsbn6VPcn33UH"] || 0,
    marginfITxs: programCounts["MFv2hWf31Z9kbCa1snEPdcgp168vLs2dz1jm3ke4GJsq"] || 0,
    counterpartiesArr: [...counterparties],
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// Scoring v2: volume thresholds + diversity multiplier + consistency multiplier
// ═══════════════════════════════════════════════════════════════════════════
function scoreProto(metrics, proto) {
  const m = metrics[proto.chain] || {};
  let total = 0;
  const bd = [];
  proto.criteria.forEach(c => {
    const v = m[c.key] ?? 0, t = c.t;
    const pts = v >= t[3] ? c.pts : v >= t[2] ? Math.round(c.pts * 0.75) : v >= t[1] ? Math.round(c.pts * 0.5) : v >= t[0] ? Math.round(c.pts * 0.25) : 0;
    total += pts;
    bd.push({ label: c.label, val: v, pts, max: c.pts });
  });
  // Diversity bonus: unique counterparties / 10, capped at +20%
  const isSol = proto.chain === "solana";
  const cps = isSol ? (m.solCounterparties || 0) : (m.counterpartiesCount || 0);
  const diversityMult = Math.min(1.2, 1 + cps / 50);
  // Consistency bonus: time spread > 30 days = +10%
  const spread = isSol ? 0 : (m.spread || 0);
  const consistencyMult = spread > 30 ? 1.1 : 1.0;
  const adjusted = Math.min(100, Math.round(total * diversityMult * consistencyMult));
  return { score: adjusted, raw: total, breakdown: bd, diversityMult, consistencyMult };
}

// ═══════════════════════════════════════════════════════════════════════════
// Sybil correlation: do two wallets share too many active days?
// ═══════════════════════════════════════════════════════════════════════════
function detectSybilClusters(metrics, allAddrs) {
  const clusters = [];
  for (let i = 0; i < allAddrs.length; i++) {
    for (let j = i + 1; j < allAddrs.length; j++) {
      const a = allAddrs[i], b = allAddrs[j];
      const mA = metrics[a], mB = metrics[b];
      if (!mA || !mB) continue;
      // Collect all days across all chains for each wallet
      const daysA = new Set(), daysB = new Set();
      Object.values(mA).forEach(cm => (cm.daysList || []).forEach(d => daysA.add(d)));
      Object.values(mB).forEach(cm => (cm.daysList || []).forEach(d => daysB.add(d)));
      if (daysA.size < 5 || daysB.size < 5) continue;
      const overlap = [...daysA].filter(d => daysB.has(d)).length;
      const smaller = Math.min(daysA.size, daysB.size);
      const pct = overlap / smaller;
      if (pct > 0.65) {
        clusters.push({ a, b, overlap, daysA: daysA.size, daysB: daysB.size, pct });
      }
    }
  }
  return clusters;
}

// ═══════════════════════════════════════════════════════════════════════════
// Gas cost roll-up (USD)
// ═══════════════════════════════════════════════════════════════════════════
function computeGasUSD(metrics, prices) {
  let totalUSD = 0;
  const byChain = {};
  Object.entries(metrics).forEach(([addr, byCh]) => {
    Object.entries(byCh).forEach(([chainId, m]) => {
      const native = (chainId === "solana" ? m.solGasNative : m.gasNative) || 0;
      const sym = CHAIN_META[chainId]?.native || "ETH";
      const usd = native * (prices[sym] || DEFAULT_PRICES[sym] || 0);
      totalUSD += usd;
      byChain[chainId] = (byChain[chainId] || 0) + usd;
    });
  });
  return { totalUSD, byChain };
}

  return (

      <text x={size/2} y={size/2 + 4} textAnchor="middle" fill={color} style={{ fontSize: 10, fontWeight: 700 }}>{score}</text>

                  <div className="sub">higher = better positioned for what's left</div>
                </div>
                <div>
                  <div className="lbl">VERDICT</div>
                  <div className="v" style={{ color: (() => {
                    const sa = PROTOCOLS.filter(p => p.tier === "S" || p.tier === "A");
                    const scores = allAddrs.flatMap(a => sa.map(p => getScore(a, p))).filter(Boolean).map(s => s.score);
                    const avg = scores.length ? Math.round(scores.reduce((x,y)=>x+y,0) / scores.length) : 0;
                    return avg > 60 && gas.totalUSD < 100 ? 'var(--accent)' : avg > 40 ? 'var(--amber)' : 'var(--red)';
                  })() }}>
                    {(() => {
                      const sa = PROTOCOLS.filter(p => p.tier === "S" || p.tier === "A");
                      const scores = allAddrs.flatMap(a => sa.map(p => getScore(a, p))).filter(Boolean).map(s => s.score);
                      const avg = scores.length ? Math.round(scores.reduce((x,y)=>x+y,0) / scores.length) : 0;
                      if (avg > 60 && gas.totalUSD < 100) return "STRONG";
                      if (avg > 40) return "MIXED";
                      return "WEAK";
                    })()}
                  </div>
                  <div className="sub">{sybilClusters.length > 0 ? `⚠ ${sybilClusters.length} sybil cluster${sybilClusters.length>1?'s':''} detected — see Sybil tab` : "No sybil correlation detected"}</div>
                </div>
              </div>

              {/* Per wallet */}
              {allWallets.map(({ a, type }) => (
                <div key={a} className="wallet-card">
                  <div className="wallet-h">
                    <Pill color={type === "evm" ? "#627EEA" : "#9945FF"} tiny>{type.toUpperCase()}</Pill>
                    <span className="name">{labels[a] || "Unnamed"}</span>
                    <span className="addr">{short(a)}</span>
                    <div className="right">
                      <span className="addr">AVG</span>
                      <Ring score={walletAvg(a)} color={walletAvg(a) >= 60 ? "#10B981" : walletAvg(a) >= 35 ? "#F59E0B" : "#EF4444"} />
                    </div>
                  </div>
                  <div className="wallet-grid">
                    {PROTOCOLS.filter(p => type === "evm" ? p.chain !== "solana" : p.chain === "solana").map(proto => {
                      const st = scanSt[statusKey(a, proto.chain)];
                      const r = getScore(a, proto);
                      return (
                        <div key={proto.id} className="proto-tile" style={{ borderColor: r && r.score > 60 ? proto.color + '40' : undefined }}>
                          <div className="top" style={{ color: proto.color }}>
                            <span>{proto.name}</span>
                            {st === "loading" && <Spin />}
                          </div>
                          {r ? <Bar v={r.score} color={proto.color} /> : <div style={{ fontSize: 9, color: 'var(--text-dim)' }}>—</div>}
                          {r && <div className="score">{r.score}/100</div>}
                          {errors[statusKey(a, proto.chain)] && <div style={{ fontSize: 8, color: 'var(--red)', marginTop: 2 }}>ERR</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}

              {/* Share row */}
              <div className="share-bar">
                <button className="btn-ghost" onClick={onShareTwitter}>📤 Share on X</button>
                <button className="btn-ghost" onClick={onCopyShare}>📋 Copy summary</button>
                <span id="copy-msg" className="meta"></span>
              </div>
            </>
          )}

          {/* WALLETS */}
          {tab === "wallets" && (
            <>
              {allWallets.map(({ a, type }) => (
                <div key={a} className="wallet-card">
                  <div className="wallet-h">
                    <Pill color={type === "evm" ? "#627EEA" : "#9945FF"} tiny>{type.toUpperCase()}</Pill>
                    <span className="name">{labels[a] || "Unnamed"}</span>
                    <span className="addr">{a}</span>
                  </div>
                  {PROTOCOLS.filter(p => type === "evm" ? p.chain !== "solana" : p.chain === "solana").map(proto => {
                    const st = scanSt[statusKey(a, proto.chain)];
                    const r = getScore(a, proto);
                    return (
                      <div key={proto.id} className="detail-row">
                        <div className="detail-name">
                          <b style={{ color: proto.color }}>{proto.name}</b>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <Pill color={T[proto.tier]} tiny>{proto.tier}</Pill>
                            <Pill color={CHAIN_META[proto.chain]?.color || '#6B7B8E'} tiny>{CHAIN_META[proto.chain]?.short || '?'}</Pill>
                          </div>
                        </div>
                        <div className="detail-bd">
                          {st === "loading" && <div className="meta"><Spin /> Fetching…</div>}
                          {r && !errors[statusKey(a, proto.chain)] && (
                            <>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                                <Bar v={r.score} color={proto.color} />
                                <span style={{ fontFamily: 'var(--font)', fontSize: 11, color: proto.color, fontWeight: 700, minWidth: 28 }}>{r.score}</span>
                                {r.diversityMult > 1.05 && <Pill color="#34D399" tiny>+{Math.round((r.diversityMult-1)*100)}% DIVERSITY</Pill>}
                                {r.consistencyMult > 1.05 && <Pill color="#A78BFA" tiny>+{Math.round((r.consistencyMult-1)*100)}% CONSISTENCY</Pill>}
                              </div>
                              <div className="detail-stats">
                                {r.breakdown.map((b, i) => (
                                  <span key={i}>
                                    <span className="k">{b.label}: </span>
                                    <span className={"v" + (b.pts > 0 ? "" : " zero")}>{fmt(b.val)}</span>
                                    <span className="k"> ({b.pts}/{b.max})</span>
                                  </span>
                                ))}
                              </div>
                            </>
                          )}
                          {errors[statusKey(a, proto.chain)] && <div className="err">⚠ {errors[statusKey(a, proto.chain)]}</div>}
                          {!st && <div style={{ fontSize: 9, color: 'var(--text-dim)' }}>Not scanned</div>}
                        </div>
                        {r && (
                          <Pill color={r.score >= 70 ? "#10B981" : r.score >= 40 ? "#F59E0B" : "#EF4444"}>
                            {r.score >= 70 ? "STRONG" : r.score >= 40 ? "MODERATE" : "WEAK"}
                          </Pill>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </>
          )}

          {/* PROTOCOLS */}
          {tab === "protocols" && (
            <>
              {['S','A','B','C'].map(tier => (
                <div key={tier} style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 9, letterSpacing: 3, color: T[tier], marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                    <span style={{ fontFamily: 'var(--font)', fontSize: 13, fontWeight: 700 }}>{tier}-TIER</span>
                    <span style={{ color: 'var(--text-dim)' }}>— {TIER_LABEL[tier]}</span>
                  </div>
                  <div className="proto-grid">
                    {PROTOCOLS.filter(p => p.tier === tier).map(proto => {
                      const addrs = proto.chain === "solana" ? solWallets : evmWallets;
                      const avg = protoAvg(proto);
                      return (
                        <div key={proto.id} className="proto-card">
                          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, ${proto.color}, transparent)` }} />
                          <div className="row">
                            <div>
                              <h4>{proto.name}</h4>
                              <div className="pills">
                                <Pill color={proto.status === "PRE-TOKEN" ? '#EF4444' : proto.status === "LIVE" ? '#10B981' : '#F59E0B'} tiny>{proto.status}</Pill>
                                <Pill color={CHAIN_META[proto.chain]?.color || '#6B7B8E'} tiny>{CHAIN_META[proto.chain]?.name || '?'}</Pill>
                                <Pill color={proto.color} tiny>{proto.cat}</Pill>
                              </div>
                            </div>
                            <div className="right">
                              <div className="pct" style={{ color: proto.color }}>{proto.likelihood}%</div>
                              <div className="sub">drop conviction</div>
                            </div>
                          </div>
                          <div className="avg-block">
                            <div style={{ fontSize: 9, color: 'var(--text-dim)', marginBottom: 4 }}>YOUR WALLET AVG</div>
                            <div className="avg-row">
                              <Bar v={avg} color={proto.color} />
                              <span className="v" style={{ color: proto.color }}>{avg}</span>
                            </div>
                          </div>
                          {addrs.length > 0 ? (
                            <div className="wallets-list">
                              {addrs.map(a => {
                                const r = getScore(a, proto);
                                const st = scanSt[statusKey(a, proto.chain)];
                                return (
                                  <div key={a} className="wallet-line">
                                    <span className="lbl">{labels[a] || short(a)}</span>
                                    {st === "loading" ? <Spin /> :
                                      r ? <><Bar v={r.score} color={proto.color} /><span style={{ color: proto.color, minWidth: 24, textAlign: 'right' }}>{r.score}</span></> :
                                      <span style={{ color: 'var(--text-dim)' }}>—</span>}
                                  </div>
                                );
                              })}
                            </div>
                          ) : (
                            <div style={{ fontSize: 10, color: 'var(--red)' }}>⚠ No {proto.chain === "solana" ? "Solana" : "EVM"} wallets added</div>
                          )}
                          <div className="notes">{proto.notes}</div>
                          <div className="est">{proto.est} potential</div>
                          {proto.action && (
                            <div style={{ marginTop: 10, display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
                              <a href={proto.action.url} target="_blank" rel="noopener" className="action-cta" style={{ display: 'inline-block', color: proto.color, fontSize: 10, fontWeight: 700, letterSpacing: 1 }}>
                                {proto.action.text} →
                              </a>
                              {proto.action.url.includes('debridge') && (
                                <a href="https://orbiter.finance/?channel=0x188699dbD8Dadd7f5e0DCBfe2D111CFF1E096F2B" target="_blank" rel="noopener" style={{ fontSize: 9, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5 }}>
                                  or via Orbiter →
                                </a>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </>
          )}

          {/* ACTIONS */}
          {tab === "actions" && (
            <>
              {actions.length === 0 && (
                <div className="empty">No critical actions. Either you're crushing it, or you haven't scanned wallets yet.</div>
              )}
              {['P0','P1','P2','P3'].map(pri => {
                const filtered = actions.filter(a => a.pri === pri);
                if (!filtered.length) return null;
                const labels = { P0: 'CRITICAL — Act today', P1: 'HIGH — This week', P2: 'MEDIUM — This month', P3: 'LOW — Optional' };
                const colors = { P0: '#EF4444', P1: '#F59E0B', P2: '#10B981', P3: '#8B5CF6' };
                return (
                  <div className="action-section" key={pri}>
                    <div className="pri-h" style={{ color: colors[pri] }}>{pri} — {labels[pri]}</div>
                    {filtered.map((a, i) => (
                      <div key={i} className={"action " + pri.toLowerCase()}>
                        <Pill color={colors[pri]}>{pri}</Pill>
                        <div className="msg">
                          <div>{a.msg}</div>
                          <div className="proto">{a.proto} · Tier {a.tier}</div>
                        </div>
                        {a.action && (
                          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                            <a className="cta" href={a.action.url} target="_blank" rel="noopener">
                              {a.action.text} →
                            </a>
                            {a.action.url.includes('debridge') && (
                              <a href="https://orbiter.finance/?channel=0x188699dbD8Dadd7f5e0DCBfe2D111CFF1E096F2B" target="_blank" rel="noopener" style={{ fontSize: 9, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5, textDecoration: 'none' }}>
                                or Orbiter →
                              </a>
                            )}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                );
              })}
            </>
          )}

          {/* SYBIL */}
          {tab === "sybil" && (
            <>
              <p style={{ color: 'var(--text-muted)', fontSize: 12, marginBottom: 16 }}>
                Protocols increasingly use clustering analysis to detect Sybil farmers. If your wallets share too many active days, they look like one person operating many wallets — and get filtered out at allocation time. This tab cross-checks your wallets pairwise.
              </p>
              {allAddrs.length < 2 ? (
                <div className="empty">Add at least 2 wallets to check for Sybil correlation.</div>
              ) : sybilClusters.length === 0 ? (
                <div className="sybil-card">
                  <div className="h" style={{ color: 'var(--accent)' }}>✓ No Sybil correlation detected</div>
                  <div className="b">Your wallets operate on sufficiently different schedules. This doesn't guarantee protocols will treat them as independent — they also check on-chain transfer patterns, IP addresses, and behavioral fingerprints — but day-overlap is the easiest signal to fix.</div>
                </div>
              ) : (
                <div className="sybil-grid">
                  {sybilClusters.map((c, i) => (
                    <div className="sybil-card warn" key={i}>
                      <div className="h" style={{ color: 'var(--red)' }}>⚠ HIGH OVERLAP: {labels[c.a] || short(c.a)} ↔ {labels[c.b] || short(c.b)}</div>
                      <div className="b">
                        Share <b style={{ color: 'var(--red)' }}>{c.overlap} active days</b> ({Math.round(c.pct * 100)}% of the smaller wallet's activity).
                        Real users rarely show this pattern. <b>Recommendation:</b> stagger activity across days, avoid scripting both at once, and don't bridge same amounts on same days.
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </>
      )}

      {/* Email capture */}
      <div className="email-block">
        <h3>Get a weekly airdrop reality check</h3>
        <p>One email per week. New protocols added to the scanner, fresh allocation criteria, post-mortems on drops that happened. No hype. Unsubscribe anytime.</p>
        <form className="email-form" onSubmit={(e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const email = fd.get('email');
          if (!email) return;
          const msg = e.target.querySelector('.msg');
          fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: (() => {
              const f = new FormData();
              f.append('access_key', 'b2fb1576-a39b-4683-8ee9-4e152f731113');
              f.append('subject', 'Airdrop newsletter signup');
              f.append('email', email);
              f.append('from_name', 'Protodex Airdrop Scanner');
              return f;
            })(),
          }).then(r => r.json()).then(d => {
            if (d.success) { msg.className = 'msg ok'; msg.textContent = "✓ You're in. Watch your inbox."; e.target.reset(); }
            else { msg.className = 'msg err'; msg.textContent = '⚠ Try again or email manja316@gmail.com directly.'; }
          }).catch(() => { msg.className = 'msg err'; msg.textContent = '⚠ Network error.'; });
        }}>
          <input type="email" name="email" placeholder="you@email.com" required />
          <button type="submit">SUBSCRIBE</button>
          <div className="msg"></div>
        </form>
      </div>
    </>
  );
}

createRoot(document.getElementById('root')).render(<AirdropScanner />);
</script>
<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
